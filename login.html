<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Career Guidance</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Oswald:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      height: 100vh;
      background: linear-gradient(to right, #e3f2fd, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: white;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .login-box h2 {
      font-family: 'Oswald', sans-serif;
      text-align: center;
      margin-bottom: 30px;
    }

    .brand {
      color: #007bff;
    }

    .form-control {
      height: 45px;
      border-radius: 8px;
    }

    .btn-login {
      width: 100%;
      height: 45px;
      border-radius: 30px;
      background: #007bff;
      color: white;
      font-size: 16px;
      border: none;
    }

    .btn-login:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Career <span class="brand">Guidance</span></h2>

    <form onsubmit="loginUser(event)">
      <div class="form-group">
        <input type="email" class="form-control" placeholder="Email Address" required>
      </div>

      <div class="form-group">
        <input type="password" class="form-control" placeholder="Password" required>
      </div>

      <button type="submit" class="btn-login">Login</button>
    </form>
  </div>

  <script>
    function loginUser(event) {
      event.preventDefault();     // stop page refresh
      sessionStorage.setItem("loggedIn", "true");
      window.location.href = "intereste.html";
    }
  </script>

</body>
</html>
