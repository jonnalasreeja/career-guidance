<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Career Guidance System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Career Guidance System</h1>
    <p>Answer the questions to get a personalized career suggestion</p>

    <form id="quizForm">

        <label>Do you enjoy coding?</label>
        <select name="coding">
            <option value="2">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Are you good at problem solving?</label>
        <select name="problem">
            <option value="2">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Interested in cybersecurity?</label>
        <select name="security">
            <option value="2">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Do you like working with networks?</label>
        <select name="network">
            <option value="2">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Do you enjoy designing interfaces?</label>
        <select name="design">
            <option value="2">Yes</option>
            <option value="0">No</option>
        </select>

        <button type="submit">Get Recommendation</button>
    </form>

    <h2 id="result"></h2>
</div>

<script src="script.js"></script>
</body>
</html>
