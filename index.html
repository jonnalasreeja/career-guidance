<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Guidance System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Career Guidance System</h1>
    <p class="subtitle">Get personalized career recommendations</p>

    <form id="quizForm">
        <div class="form-group">
            <label>Do you enjoy coding?</label>
            <select name="coding">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Do you like problem solving?</label>
            <select name="problem">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Interested in cybersecurity?</label>
            <select name="security">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <button type="submit">Get Recommendation</button>
    </form>

    <div id="resultBox" class="hidden">
        <h2>Recommended Career:</h2>
        <p id="result"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
